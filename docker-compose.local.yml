version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./agentos.db
      - ENVIRONMENT=development
    volumes:
      - ./api:/app
      - api_data:/app
    networks:
      - agentos-local
    restart: unless-stopped

  monitor:
    build:
      context: ./monitor
      dockerfile: Dockerfile
    privileged: true
    env_file: .env
    environment:
      - MONITOR_API_URL=http://api:8001
    depends_on:
      - api
    networks:
      - agentos-local
    restart: unless-stopped

volumes:
  api_data:

networks:
  agentos-local:
    driver: bridge
